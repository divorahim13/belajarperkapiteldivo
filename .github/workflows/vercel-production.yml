name: Deploy to Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_9deBK1lNH8uBxJUXl6yrKmps
      VERCEL_PROJECT_ID: prj_wSu2P8gLsgBHUAk2FNXW5EmCNa9i
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel environment
        run: npx vercel@53.1.1 pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: npx vercel@53.1.1 build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: npx vercel@53.1.1 deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
